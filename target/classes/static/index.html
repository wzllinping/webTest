<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户信息管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --primary: #2f80ed;
            --primary-light: #e3f2ff;
            --bg: #f5f7fb;
            --text: #1f2933;
            --border-radius: 10px;
            --shadow-soft: 0 10px 25px rgba(15, 35, 52, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at top left, #e0f2ff 0, #f5f7fb 50%, #ffffff 100%);
            color: var(--text);
        }

        .app-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 1080px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            padding: 24px 28px 28px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-pill {
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 12px;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 13px;
            color: #6b7280;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid #d0d7e2;
            font-size: 13px;
            min-width: 220px;
            outline: none;
            background-color: #f8fafc;
            transition: box-shadow 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
        }

        .search-input:focus {
            background-color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(47, 128, 237, 0.15);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2f80ed, #1c64f2);
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
        }

        .btn-primary:hover {
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.45);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
            transform: translateY(0);
        }

        .btn-ghost {
            background: transparent;
            color: var(--primary);
        }

        .btn-ghost:hover {
            background: var(--primary-light);
        }

        .content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .form-card {
            background: linear-gradient(145deg, #f3f6ff, #ffffff);
            border-radius: 18px;
            padding: 16px 16px 18px;
            border: 1px solid #e0e7ff;
        }

        .form-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .form-input {
            width: 100%;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid #d1d9e6;
            font-size: 13px;
            outline: none;
            background-color: #ffffff;
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(47, 128, 237, 0.13);
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }

        .table-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 10px 16px 14px;
            border: 1px solid #e5e7eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #f3f4ff;
        }

        th, td {
            padding: 8px 10px;
            text-align: left;
        }

        th {
            font-weight: 600;
            color: #4b5563;
            border-bottom: 1px solid #e5e7eb;
        }

        tbody tr:nth-child(even) {
            background: #fafbff;
        }

        tbody tr:hover {
            background: #eef3ff;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: #e0f2ff;
            color: #0369a1;
        }

        .empty-tip {
            text-align: center;
            padding: 18px 0 6px;
            color: #9ca3af;
            font-size: 13px;
        }

        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #ecfdf5;
            color: #047857;
        }

        .muted {
            color: #9ca3af;
            font-size: 12px;
        }

        .status-text {
            font-size: 12px;
            color: #6b7280;
        }

        .pill {
            padding: 2px 8px;
            border-radius: 999px;
            background: #f3f4ff;
            font-size: 11px;
            color: #4b5563;
        }

        .btn-sm {
            padding: 4px 9px;
            font-size: 11px;
            border-radius: 999px;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #d1d5db;
            color: #374151;
        }

        .btn-outline:hover {
            background: #f3f4ff;
            border-color: var(--primary);
            color: var(--primary);
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 11px;
        }
    </style>
</head>
<body>
<div id="app" class="app-wrapper">
    <div class="card">
        <div class="card-header">
            <div>
                <div class="title">
                    用户信息管理
                    <span class="title-pill">Vue + Spring Boot + MyBatis</span>
                </div>
                <div class="subtitle">
                    支持新增 / 修改 / 删除 / 列表展示 / 按名称搜索，本页面为单页应用。
                </div>
            </div>
            <div class="actions">
                <input
                        v-model="searchName"
                        @keyup.enter="fetchUsers"
                        class="search-input"
                        type="text"
                        placeholder="按名称搜索用户..."
                >
                <button class="btn btn-ghost" @click="resetSearch">重置</button>
            </div>
        </div>

        <div class="content">
            <div class="form-card">
                <div class="form-title">
                    {{ editingUserId ? '编辑用户' : '新增用户' }}
                </div>

                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input class="form-input" v-model="form.name" type="text" placeholder="请输入用户名称（必填）">
                </div>
                <div class="form-group">
                    <label class="form-label">地址</label>
                    <input class="form-input" v-model="form.address" type="text" placeholder="请输入地址（必填）">
                </div>

                <div class="form-footer">
                    <button v-if="editingUserId" class="btn btn-outline" @click="cancelEdit">取消</button>
                    <button class="btn btn-primary" @click="submitForm">
                        {{ editingUserId ? '保存修改' : '添加用户' }}
                    </button>
                </div>
                <p class="status-text" v-if="message">
                    {{ message }}
                </p>
            </div>

            <div class="table-card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <div class="chip">
                        共 {{ users.length }} 条记录
                    </div>
                    <span class="muted">点击“编辑”或“删除”可对用户进行操作</span>
                </div>
                <table v-if="users.length">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>地址</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr v-for="user in users" :key="user.id">
                        <td>
                            <span class="pill">#{{ user.id }}</span>
                        </td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.address }}</td>
                        <td>
                            <button class="btn btn-sm btn-outline" @click="startEdit(user)">编辑</button>
                            <button class="btn btn-sm btn-danger" @click="remove(user)">删除</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div v-else class="empty-tip">
                    当前没有用户数据，请先在左侧添加。
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3"></script>
<script>
    const {createApp, ref, reactive, onMounted} = Vue;

    createApp({
        setup() {
            const users = ref([]);
            const searchName = ref('');
            const editingUserId = ref(null);
            const message = ref('');
            const form = reactive({
                name: '',
                address: ''
            });

            const apiBase = '/api/users';

            const fetchUsers = async () => {
                try {
                    let url = apiBase;
                    if (searchName.value) {
                        url += '?name=' + encodeURIComponent(searchName.value.trim());
                    }
                    const resp = await fetch(url);
                    users.value = await resp.json();
                } catch (e) {
                    console.error(e);
                    message.value = '加载用户列表失败，请检查后端是否已启动。';
                }
            };

            const resetForm = () => {
                form.name = '';
                form.address = '';
                editingUserId.value = null;
            };

            const submitForm = async () => {
                if (!form.name) {
                    message.value = '名称不能为空';
                    return;
                }
                if (!form.address) {
                    message.value = '地址不能为空';
                    return;
                }

                const payload = {
                    name: form.name,
                    address: form.address
                };

                try {
                    let resp;
                    if (editingUserId.value) {
                        resp = await fetch(`${apiBase}/${editingUserId.value}`, {
                            method: 'PUT',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                    } else {
                        resp = await fetch(apiBase, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                    }

                    if (!resp.ok) {
                        throw new Error('请求失败');
                    }

                    await fetchUsers();
                    message.value = editingUserId.value ? '修改成功' : '新增成功';
                    resetForm();
                } catch (e) {
                    console.error(e);
                    message.value = '保存失败，请检查后端或网络。';
                }
            };

            const startEdit = (user) => {
                editingUserId.value = user.id;
                form.name = user.name;
                form.address = user.address;
                message.value = '';
            };

            const cancelEdit = () => {
                resetForm();
                message.value = '';
            };

            const remove = async (user) => {
                if (!confirm(`确定删除用户「${user.name}」吗？`)) {
                    return;
                }
                try {
                    const resp = await fetch(`${apiBase}/${user.id}`, {method: 'DELETE'});
                    if (!resp.ok) {
                        throw new Error('删除失败');
                    }
                    await fetchUsers();
                    message.value = '删除成功';
                } catch (e) {
                    console.error(e);
                    message.value = '删除失败，请稍后重试。';
                }
            };

            const resetSearch = () => {
                searchName.value = '';
                fetchUsers();
            };

            onMounted(fetchUsers);

            return {
                users,
                searchName,
                form,
                message,
                editingUserId,
                fetchUsers,
                submitForm,
                startEdit,
                cancelEdit,
                remove,
                resetSearch
            };
        }
    }).mount('#app');
</script>
</body>
</html>
